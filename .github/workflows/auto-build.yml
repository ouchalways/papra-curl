name: Auto-Build on Upstream Release

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Check for new release
        id: check_release
        run: |
          RESPONSE=$(curl -s https://api.github.com/repos/papra-hq/papra/releases/latest)
          RAW_TAG=$(echo "$RESPONSE" | jq -r .tag_name)
          PUBLISHED_AT=$(echo "$RESPONSE" | jq -r .published_at)
          
          # Sanitize tag
          CLEAN_TAG=$(echo "$RAW_TAG" | sed 's/[^a-zA-Z0-9._-]/-/g' | sed 's/^-*//;s/-*$//;s/^\.*//;s/\.*$//')
          
          if [ -f latest-version.txt ]; then
            CURRENT=$(cat latest-version.txt)
          else
            CURRENT="none"
          fi
          
          PUB_TS=$(date -d "$PUBLISHED_AT" +%s)
          NOW_TS=$(date +%s)
          DIFF_HOURS=$(( ($NOW_TS - $PUB_TS) / 3600 ))
          
          if [ "$CLEAN_TAG" != "$CURRENT" ] && [ $DIFF_HOURS -ge 48 ]; then
            echo "should_build=true" >> $GITHUB_OUTPUT
            echo "$CLEAN_TAG" > latest-version.txt
          else
            echo "should_build=false" >> $GITHUB_OUTPUT
          fi
          echo "tag=$CLEAN_TAG" >> $GITHUB_OUTPUT

      - name: Login to GitHub Container Registry
        if: steps.check_release.outputs.should_build == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push
        if: steps.check_release.outputs.should_build == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/ouchalways/papra-with-curl:${{ steps.check_release.outputs.tag }}
            ghcr.io/ouchalways/papra-with-curl:latest

      - name: Commit version update
        if: steps.check_release.outputs.should_build == 'true'
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add latest-version.txt
          git commit -m "Update papra to version ${{ steps.check_release.outputs.tag }}"
          git push
