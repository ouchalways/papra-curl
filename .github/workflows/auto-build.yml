name: Auto-Build on Upstream Release

on:
  schedule:
    # Run once a day at midnight
    - cron: '0 0 * * *'
  workflow_dispatch: # Allows manual testing

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Check for new release
        id: check_release
        run: |
          # Get latest version and release date from upstream
          RESPONSE=$(curl -s https://api.github.com/repos/papra-hq/papra/releases/latest)
          TAG=$(echo $RESPONSE | jq -r .tag_name)
          PUBLISHED_AT=$(echo $RESPONSE | jq -r .published_at)
          
          # Compare with current version
          if [ -f latest-version.txt ]; then
            CURRENT=$(cat latest-version.txt)
          else
            CURRENT="none"
          fi
          
          # Check if 48 hours have passed since release
          PUB_TS=$(date -d "$PUBLISHED_AT" +%s)
          NOW_TS=$(date +%s)
          DIFF_HOURS=$(( ($NOW_TS - $PUB_TS) / 3600 ))
          
          if [ "$TAG" != "$CURRENT" ] && [ $DIFF_HOURS -ge 48 ]; then
            echo "should_build=true" >> $GITHUB_OUTPUT
            echo "$TAG" > latest-version.txt
          else
            echo "should_build=false" >> $GITHUB_OUTPUT
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Build and Push
        if: steps.check_release.outputs.should_build == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/${{ github.repository_owner }}/papra-with-curl:${{ steps.check_release.outputs.tag }}
            ghcr.io/${{ github.repository_owner }}/papra-with-curl:latest
        env:
          DOCKER_BUILD_TAG: ${{ steps.check_release.outputs.tag }}

      - name: Commit version update
        if: steps.check_release.outputs.should_build == 'true'
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add latest-version.txt
          git commit -m "Update papra to version ${{ steps.check_release.outputs.tag }}"
          git push
